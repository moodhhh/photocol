<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Story Image</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    img {
      width: 90%;
      max-width: 600px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
      cursor: pointer;
      transition: transform 0.3s;
    }
    img:hover {
      transform: scale(1.03);
    }
  </style>
</head>
<body>
  <a href="https://slphotozet.blogspot.com/2025/11/sample-post-01.html?m=1" target="_blank">
    <img src="https://kathaxmax.github.io/VideoHost/Videos/photozettest.jpg" alt="Story Image">
  </a>
</body>
</html>
